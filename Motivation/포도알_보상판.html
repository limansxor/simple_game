<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🍇 포도알 보상판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#fdf2ff; --bg2:#eef0ff; --bg3:#fde8f3;
    --card:#ffffff; --ink:#5b4a6b; --ink-soft:#9b8aad;
    --grape:#a78bfa; --grape-deep:#7c3aed; --grape-dark:#6d28d9;
    --pink:#fb9fd0; --gold:#ffd56b; --gold-deep:#f5b73d;
    --red:#e0518a; --green:#16a36a;
    --shadow:0 10px 30px rgba(124,58,237,.12);
    --shadow-sm:0 4px 14px rgba(124,58,237,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Gaegu','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--ink);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    min-height:100vh;background-attachment:fixed;-webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.jua{font-family:'Jua','Apple SD Gothic Neo',sans-serif;font-weight:400;}
  .wrap{max-width:920px;margin:0 auto;padding:16px 16px 70px;}

  .topbar{display:flex;align-items:center;gap:10px;padding:8px 2px 4px;flex-wrap:wrap;}
  .topbar .brand{font-family:'Jua',sans-serif;font-size:24px;color:var(--grape-dark);cursor:pointer;}
  .topbar .spacer{flex:1;}
  .conn{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;background:#bbb;}
  .dot.on{background:#33c781;} .dot.off{background:#e06b6b;}

  .card{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:20px;margin:14px 0;}
  .card h2{font-size:20px;margin:0 0 12px;color:var(--grape-dark);display:flex;align-items:center;gap:8px;}

  .row{display:flex;gap:10px;flex-wrap:wrap;}
  input[type=text],input[type=url],input[type=number]{
    flex:1;min-width:0;font-family:inherit;font-size:17px;color:var(--ink);
    padding:12px 15px;border:2px solid #ecdffb;border-radius:14px;background:#fbf7ff;outline:none;transition:border .15s;
  }
  input:focus{border-color:var(--grape);}
  button{
    font-family:'Jua',sans-serif;font-size:16px;cursor:pointer;border:none;border-radius:14px;
    padding:12px 20px;color:#fff;background:linear-gradient(135deg,var(--grape),var(--grape-deep));
    box-shadow:0 4px 0 var(--grape-dark);transition:transform .08s,box-shadow .08s;white-space:nowrap;
  }
  button:active{transform:translateY(3px);box-shadow:0 1px 0 var(--grape-dark);}
  button.ghost{background:#fff;color:var(--grape-deep);box-shadow:0 3px 0 #e3d4f7;border:2px solid #ecdffb;}
  button.ghost:active{transform:translateY(2px);box-shadow:0 0 0 #e3d4f7;}
  button.pink{background:linear-gradient(135deg,var(--pink),#f06fb6);box-shadow:0 4px 0 #d44d99;}
  button.danger{background:linear-gradient(135deg,#ff8aa6,#e0518a);box-shadow:0 4px 0 #c23a72;}
  button.small{font-size:13px;padding:7px 12px;box-shadow:0 3px 0 var(--grape-dark);}
  button.small.ghost{box-shadow:0 3px 0 #e3d4f7;}
  button.small.danger{box-shadow:0 3px 0 #c23a72;}
  .hint{font-size:13px;color:var(--ink-soft);margin:8px 2px 0;}
  .feedback{margin-top:9px;font-size:15px;min-height:20px;font-family:'Jua',sans-serif;}
  .feedback.ok{color:var(--green);} .feedback.bad{color:var(--red);}
  .muted{color:var(--ink-soft);font-size:14px;}

  /* 보상판 목록 */
  .board-card{display:flex;align-items:center;gap:14px;cursor:pointer;background:linear-gradient(180deg,#fff,#fbf5ff);}
  .board-card:hover{transform:translateY(-2px);transition:transform .12s;}
  .board-card .bicon{font-size:34px;}
  .board-card .binfo{flex:1;min-width:0;}
  .board-card .bname{font-family:'Jua',sans-serif;font-size:20px;color:var(--grape-dark);}
  .board-card .bsub{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .bar{height:12px;background:#eee6f7;border-radius:8px;overflow:hidden;margin-top:8px;}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--grape),var(--grape-deep));border-radius:8px;transition:width .4s;}
  .pill{background:#fff3d6;border:1px solid var(--gold);color:var(--gold-deep);border-radius:12px;padding:3px 10px;font-size:13px;white-space:nowrap;}

  /* 포도송이 */
  .cluster-card{text-align:center;background:linear-gradient(180deg,#fff,#fbf5ff);position:relative;overflow:hidden;}
  .cluster-card.near{animation:glowpulse 1s infinite;}
  @keyframes glowpulse{0%,100%{box-shadow:0 0 14px 2px rgba(245,183,61,.5),var(--shadow);}50%{box-shadow:0 0 26px 8px rgba(245,183,61,.85),var(--shadow);}}
  .stem{width:10px;height:24px;background:linear-gradient(#b07a4e,#8a5a32);border-radius:6px;margin:0 auto -4px;}
  .leaf{font-size:28px;margin-bottom:-6px;display:inline-block;transform:rotate(-12deg);}
  .cluster{display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 0 4px;}
  .grow-row{display:flex;gap:7px;justify-content:center;}
  .grape{width:30px;height:30px;border-radius:50%;
    background:radial-gradient(circle at 32% 30%, #f3edff 0%, #e6dcff 35%, #d9c9ff 60%, #cdb8f7 100%);
    border:2px dashed #d9c9f5;position:relative;}
  .grape.filled{background:radial-gradient(circle at 32% 28%, #c9b3ff 0%, var(--grape) 38%, var(--grape-deep) 78%, var(--grape-dark) 100%);
    border:2px solid rgba(255,255,255,.55);box-shadow:inset -3px -4px 6px rgba(76,29,149,.45),0 3px 6px rgba(109,40,217,.25);}
  .grape.filled::after{content:"";position:absolute;top:5px;left:7px;width:8px;height:6px;border-radius:50%;background:rgba(255,255,255,.85);transform:rotate(-20deg);}
  .grape.mark{outline:3px dotted var(--gold);outline-offset:2px;}
  @keyframes pop{0%{transform:scale(0) rotate(-30deg);}60%{transform:scale(1.35) rotate(8deg);}100%{transform:scale(1);}}
  .grape.justpopped{animation:pop .45s cubic-bezier(.2,1.3,.4,1);}
  .progress-text{margin-top:10px;color:var(--ink-soft);font-size:16px;}
  .progress-text b{color:var(--grape-deep);font-family:'Jua',sans-serif;font-size:19px;}
  .floatup{position:absolute;left:50%;top:38%;transform:translateX(-50%);font-family:'Jua',sans-serif;font-size:30px;color:var(--grape-deep);pointer-events:none;animation:floaty 1.1s ease-out forwards;z-index:5;}
  @keyframes floaty{0%{opacity:0;transform:translate(-50%,12px) scale(.7);}20%{opacity:1;}100%{opacity:0;transform:translate(-50%,-52px) scale(1.1);}}

  /* 관리자 */
  .adm-board{background:#fff;border-radius:18px;box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:12px;}
  .adm-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .adm-head .nm{font-family:'Jua',sans-serif;font-size:18px;color:var(--grape-dark);flex:1;min-width:120px;cursor:pointer;}
  .adm-meta{font-size:13px;color:var(--ink-soft);margin:6px 0 2px;}
  .adm-meta code{background:#f3eefb;border-radius:6px;padding:1px 6px;color:var(--grape-deep);}
  .links-tbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;}
  .links-tbl th,.links-tbl td{text-align:left;padding:7px 8px;border-bottom:1px solid #f0eaf8;vertical-align:middle;}
  .links-tbl th{color:var(--ink-soft);font-weight:normal;font-size:12px;}
  .links-tbl td.url{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .links-tbl a{color:var(--grape-deep);text-decoration:none;}
  .links-tbl .gv{font-family:'Jua',sans-serif;color:var(--grape-deep);white-space:nowrap;}
  .empty{color:var(--ink-soft);font-size:14px;padding:6px 2px;}

  /* 팝업 */
  .overlay{position:fixed;inset:0;background:rgba(91,74,107,.35);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
  .overlay.show{display:flex;animation:fadein .2s;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}
  .reveal{background:#fff;border-radius:28px;padding:28px 32px;text-align:center;box-shadow:0 20px 60px rgba(124,58,237,.35);transform:scale(.7);animation:popin .45s cubic-bezier(.2,1.4,.4,1) forwards;max-width:88vw;}
  @keyframes popin{to{transform:scale(1);}}
  .reveal .grapes-burst{font-size:56px;letter-spacing:4px;min-height:60px;}
  .reveal.rolling .grapes-burst{animation:shakeRoll .25s infinite;}
  @keyframes shakeRoll{0%,100%{transform:rotate(-8deg) scale(1);}50%{transform:rotate(8deg) scale(1.12);}}
  .reveal .title{font-family:'Jua',sans-serif;font-size:28px;color:var(--grape-dark);margin:6px 0;}
  .reveal .sub{color:var(--ink-soft);font-size:17px;margin-bottom:16px;}
  .reveal.golden-pop .title,.reveal.lecture-pop .title{color:var(--gold-deep);}
  .reveal.lecture-pop{box-shadow:0 20px 70px rgba(245,183,61,.5);}
  .confetti{position:fixed;top:-30px;font-size:22px;z-index:60;pointer-events:none;will-change:transform;}
  @keyframes fall{to{transform:translateY(108vh) rotate(540deg);opacity:.9;}}
  .flash{position:fixed;inset:0;background:#fff;z-index:55;pointer-events:none;opacity:0;}
  .flash.go{animation:flashAnim .5s ease-out;}
  @keyframes flashAnim{0%{opacity:.6;}100%{opacity:0;}}

  footer{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:22px;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="brand" data-action="home">🍇 포도알 보상판</span>
    <span class="spacer"></span>
    <span class="conn"><span class="dot" id="connDot"></span><span id="connText">연결 중…</span></span>
    <button class="ghost small" id="adminBtn" data-action="admin">🔐 관리자</button>
  </div>
  <div id="app"></div>
  <footer>Firebase 실시간 저장 · podotree</footer>
</div>

<div class="overlay" id="overlay">
  <div class="reveal" id="reveal">
    <div class="grapes-burst" id="revealBurst">🎁</div>
    <div class="title" id="revealTitle">두구두구…</div>
    <div class="sub" id="revealSub">포도알 뽑는 중!</div>
    <button id="revealClose">좋아 🍇</button>
  </div>
</div>

<script>
"use strict";

/* ===== 설정 ===== */
var DB_URL = "https://podotree-43c54-default-rtdb.asia-southeast1.firebasedatabase.app";
var ADMIN_PASS = "1234";   // 관리자 비밀번호 (바꾸세요). ""로 두면 잠금 해제.

/* ===== Firebase ===== */
var db = null, fatal = null;
try{
  firebase.initializeApp({ databaseURL: DB_URL });
  db = firebase.database();
}catch(e){ fatal = e; }

/* ===== 상태 ===== */
var boards = {};
var view = "list";          // list | detail | admin
var currentId = null;
var expanded = {};
var prevFilled = 0, GROW_ROWS = null, GROW_FOR = -1;

/* ===== 순수 로직 ===== */
var TRACKING = ["utm_source","utm_medium","utm_campaign","utm_term","utm_content","fbclid","gclid","igshid","spm","ref","ref_src","src","cid"];
function normalizeUrl(raw){
  if(!raw) return null;
  var s = String(raw).trim(); if(s==="") return null;
  if(!/^https?:\/\//i.test(s)) s = "https://" + s;
  var u; try{ u = new URL(s); }catch(e){ return null; }
  if(u.protocol!=="http:" && u.protocol!=="https:") return null;
  if(!u.hostname || u.hostname.indexOf(".")===-1) return null;
  var host = u.hostname.toLowerCase().replace(/^www\./,"").replace(/^m\./,"");
  var path = u.pathname.replace(/\/+$/,""); if(path==="") path="/";
  var params = [];
  u.searchParams.forEach(function(v,k){ if(TRACKING.indexOf(k.toLowerCase())===-1) params.push([k,v]); });
  params.sort(function(a,b){ return a[0]<b[0]?-1:a[0]>b[0]?1:(a[1]<b[1]?-1:1); });
  var q = params.map(function(p){ return p[0]+"="+p[1]; }).join("&");
  return host + path + (q?"?"+q:"");
}
function rollDraw(){
  var r = Math.random();
  if(r < 0.02) return { grapes:5, golden:true };
  var r2 = (r-0.02)/0.98;
  var g = r2<0.70 ? 1 : r2<0.92 ? 2 : 3;
  return { grapes:g, golden:false };
}

/* ===== 파생값 ===== */
function goalOf(b){ return (b && b.goal) ? b.goal : 30; }
function totalOf(b){ return (b && b.totalGrapes) ? b.totalGrapes : 0; }
function grapesOf(b){ return totalOf(b) % goalOf(b); }
function earnedOf(b){ return Math.floor(totalOf(b) / goalOf(b)); }
function linkPairs(b){
  if(!b || !b.links) return [];
  return Object.keys(b.links).map(function(k){ return [k, b.links[k]]; })
    .sort(function(a,b2){ return (b2[1].at||0) - (a[1].at||0); });
}

/* ===== Firebase 액션 ===== */
function createBoard(name, goal){
  var r = db.ref("boards").push();
  return r.set({ name:name, goal:goal, totalGrapes:0, createdAt:Date.now() });
}
function registerLink(id, raw){
  var b = boards[id]; if(!b) return;
  var canon = normalizeUrl(raw);
  var fb = document.getElementById("linkFeedback");
  if(!canon){ setFb(fb,"올바른 링크 형식이 아니에요. 예: https://blog.naver.com/아이디/글번호","bad"); playSound("bad"); return; }
  var links = b.links || {};
  for(var k in links){ if(links[k].canonical===canon){ setFb(fb,"이미 등록한 글이에요! 🙅 (중복 링크)","bad"); playSound("bad"); return; } }
  var draw = rollDraw();
  var goal = goalOf(b);
  var oldTotal = totalOf(b);
  var newTotal = oldTotal + draw.grapes;
  var gainedReward = Math.floor(newTotal/goal) > Math.floor(oldTotal/goal);
  var key = db.ref("boards/"+id+"/links").push().key;
  var updates = {};
  updates["boards/"+id+"/links/"+key] = { url:String(raw).trim(), canonical:canon, grapes:draw.grapes, at:Date.now() };
  updates["boards/"+id+"/totalGrapes"] = newTotal;
  db.ref().update(updates).then(function(){
    var el = document.getElementById("linkInput"); if(el) el.value="";
    setFb(fb,"등록 완료! 포도알 "+draw.grapes+"알 획득 🍇","ok");
    floatUp("+"+draw.grapes+(draw.golden?" 🌟":" 🍇"), draw.golden);
    showDraw({ n:draw.grapes, golden:draw.golden, gainedReward:gainedReward, remaining: goal - (newTotal%goal), earned: Math.floor(newTotal/goal) });
  }).catch(function(err){ setFb(fb,"저장 실패: "+(err.message||err),"bad"); });
}
function deleteLink(id, key){
  var b = boards[id]; if(!b || !b.links || !b.links[key]) return;
  var g = b.links[key].grapes || 0;
  if(!window.confirm("이 블로그 주소를 삭제하면 포도알 "+g+"개가 차감돼요.\n진행할까요?")) return;
  var newTotal = Math.max(0, totalOf(b) - g);
  var updates = {};
  updates["boards/"+id+"/links/"+key] = null;
  updates["boards/"+id+"/totalGrapes"] = newTotal;
  db.ref().update(updates);
}
function deleteBoard(id){
  var b = boards[id]; if(!b) return;
  if(!window.confirm("'"+(b.name||"이 보상판")+"'을(를) 통째로 삭제할까요?\n포도알·블로그 주소·목표가 모두 사라져요. (되돌릴 수 없음)")) return;
  db.ref("boards/"+id).remove();
  if(currentId===id){ currentId=null; view="list"; }
}
function editBoard(id){
  var b = boards[id]; if(!b) return;
  var name = window.prompt("보상판 이름", b.name||"");
  if(name===null) return;
  var goalStr = window.prompt("목표 포도알 수 (이 개수를 모으면 1번 달성)", String(goalOf(b)));
  if(goalStr===null) return;
  var goal = Math.max(1, parseInt(goalStr,10)||goalOf(b));
  db.ref("boards/"+id).update({ name:(name.trim()||b.name), goal:goal });
}

/* ===== 렌더 ===== */
function setFb(el,msg,cls){ if(el){ el.textContent=msg; el.className="feedback "+(cls||""); } }
function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
function timeAgo(ts){ var s=Math.floor((Date.now()-ts)/1000); if(s<60)return"방금"; if(s<3600)return Math.floor(s/60)+"분 전"; if(s<86400)return Math.floor(s/3600)+"시간 전"; return Math.floor(s/86400)+"일 전"; }

function render(){
  var app = document.getElementById("app");
  if(fatal){ app.innerHTML = '<div class="card"><h2>⚠️ 오류</h2><p class="muted">'+esc(fatal.message||String(fatal))+'</p></div>'; return; }
  var ab = document.getElementById("adminBtn");
  ab.textContent = (view==="admin") ? "👤 사용자 화면" : "🔐 관리자";
  ab.dataset.action = (view==="admin") ? "home" : "admin";
  if(view==="admin"){ app.innerHTML = renderAdmin(); return; }
  if(view==="detail" && boards[currentId]){ app.innerHTML = renderDetail(); afterDetail(); return; }
  view="list"; app.innerHTML = renderList();
}

function renderList(){
  var ids = Object.keys(boards);
  var html = "";
  if(ids.length===0){
    html += '<div class="card"><p class="muted">아직 보상판이 없어요. 아래에서 첫 보상판을 만들어보세요! 🍇</p></div>';
  } else {
    html += ids.map(function(id){
      var b = boards[id], goal=goalOf(b), g=grapesOf(b), earned=earnedOf(b);
      var pct = Math.round(g/goal*100);
      return '<div class="card board-card" data-action="open" data-id="'+id+'">'
        + '<div class="bicon">🍇</div>'
        + '<div class="binfo"><div class="bname">'+esc(b.name||"이름 없는 보상판")+'</div>'
        + '<div class="bsub">포도알 '+g+' / '+goal+' 알</div>'
        + '<div class="bar"><div class="fill" style="width:'+pct+'%"></div></div></div>'
        + (earned>0 ? '<span class="pill">🏆 '+earned+'번 달성</span>' : '')
        + '</div>';
    }).join("");
  }
  html += '<div class="card"><h2>＋ 새 보상판 만들기</h2>'
    + '<div class="row"><input type="text" id="newBoardName" placeholder="보상판 이름 (예: 강의권 보상판)" autocomplete="off" /></div>'
    + '<div class="row" style="margin-top:10px;align-items:center;">'
    + '<span class="muted">목표 포도알</span><input type="number" id="newBoardGoal" value="30" min="1" max="500" style="max-width:120px;" />'
    + '<button class="pink" data-action="create">만들기</button></div>'
    + '<div class="hint">이 목표 개수를 모으면 보상(예: 강의권) 1번 달성으로 쳐요.</div></div>';
  return html;
}

function renderDetail(){
  var b = boards[currentId], goal=goalOf(b), g=grapesOf(b), earned=earnedOf(b), left=goal-g;
  var pairs = linkPairs(b);
  var html = '<div class="row" style="margin-bottom:6px;"><button class="ghost small" data-action="home">← 목록</button></div>';
  html += '<div style="text-align:center;margin:4px 0 2px;"><h1 style="font-size:28px;margin:0;color:var(--grape-dark);">'+esc(b.name||"보상판")+'</h1>'
    + '<p class="muted" style="margin:4px 0;">🏆 지금까지 '+earned+'번 달성 · 목표 '+goal+'알</p></div>';
  html += '<div class="card cluster-card'+((left<=3&&g>0)?' near':'')+'" id="clusterCard">'
    + '<div class="stem"></div><div class="leaf" style="transform:rotate(14deg)">🍃</div>'
    + '<div class="cluster" id="cluster"></div>'
    + '<div class="progress-text" id="progressText"><b>'+g+'</b> / '+goal+' 알 &nbsp;·&nbsp; 목표까지 <b>'+left+'</b>알!</div></div>';
  html += '<div class="card"><h2>✍️ 블로그 글 등록</h2>'
    + '<div class="row"><input type="text" id="linkInput" placeholder="작성한 블로그 글 주소를 붙여넣어 주세요" autocomplete="off" />'
    + '<button data-action="register">등록하고 포도알 받기</button></div>'
    + '<div class="feedback" id="linkFeedback"></div>'
    + '<div class="hint">같은 글(링크)은 중복으로 인정되지 않아요. 새 글 주소를 넣으면 랜덤 <b>1~3알</b>(드물게 황금 +5알 🌟)이 떨어집니다.</div></div>';
  html += '<div class="card"><h2>📜 등록한 블로그 주소 ('+pairs.length+')</h2>';
  if(pairs.length===0){ html += '<p class="empty">아직 등록한 글이 없어요.</p>'; }
  else {
    html += pairs.map(function(p){
      var L=p[1];
      return '<div style="display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:7px 2px;border-bottom:1px dashed #eee;">'
        + '<a href="'+esc(L.url)+'" target="_blank" rel="noopener" style="color:var(--grape-deep);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72%;">'+esc(L.url)+'</a>'
        + '<span style="color:var(--grape-deep);font-family:Jua,sans-serif;white-space:nowrap;">+'+(L.grapes||0)+'🍇 · '+timeAgo(L.at)+'</span></div>';
    }).join("");
  }
  html += '</div>';
  return html;
}

function renderAdmin(){
  var ids = Object.keys(boards);
  var html = '<div class="card"><h2>🔐 관리자 · 데이터</h2>'
    + '<p class="muted">보상판별 포도알·블로그 주소·목표를 확인하고 정리해요. 블로그 주소를 삭제하면 그만큼 포도알이 자동 차감됩니다.</p></div>';
  if(ids.length===0){ html += '<div class="card"><p class="empty">데이터가 없어요.</p></div>'; return html; }
  html += ids.map(function(id){
    var b=boards[id], goal=goalOf(b), total=totalOf(b), g=grapesOf(b), earned=earnedOf(b);
    var pairs = linkPairs(b);
    var open = !!expanded[id];
    var s = '<div class="adm-board">'
      + '<div class="adm-head"><span class="nm" data-action="toggle" data-id="'+id+'">'+(open?"▼":"▶")+' '+esc(b.name||"이름없음")+'</span>'
      + '<button class="small ghost" data-action="edit" data-id="'+id+'">이름·목표 수정</button>'
      + '<button class="small danger" data-action="delboard" data-id="'+id+'">보상판 삭제</button></div>'
      + '<div class="adm-meta">목표 <code>'+goal+'</code> · 누적포도 <code>'+total+'</code> · 현재 <code>'+g+'/'+goal+'</code> · 달성 <code>'+earned+'</code> · 글 <code>'+pairs.length+'</code></div>';
    if(open){
      if(pairs.length===0){ s += '<p class="empty">등록된 블로그 주소가 없어요.</p>'; }
      else{
        s += '<table class="links-tbl"><thead><tr><th>#</th><th>블로그 주소</th><th>포도</th><th>등록</th><th></th></tr></thead><tbody>';
        s += pairs.map(function(p,i){
          var L=p[1];
          return '<tr><td>'+(i+1)+'</td>'
            + '<td class="url"><a href="'+esc(L.url)+'" target="_blank" rel="noopener">'+esc(L.url)+'</a></td>'
            + '<td class="gv">+'+(L.grapes||0)+'</td>'
            + '<td class="muted">'+timeAgo(L.at)+'</td>'
            + '<td><button class="small danger" data-action="dellink" data-id="'+id+'" data-key="'+p[0]+'">삭제 −'+(L.grapes||0)+'</button></td></tr>';
        }).join("");
        s += '</tbody></table>';
      }
    }
    s += '</div>';
    return s;
  }).join("");
  return html;
}

/* 포도송이 그리기 */
function buildRows(size){
  var rows=[], rem=size, w=Math.max(4, Math.round(Math.sqrt(size)+1));
  while(rem>0){ var t=Math.min(w,rem); rows.push(t); rem-=t; if(rows.length>=2&&w>1) w--; }
  return rows;
}
function afterDetail(){
  var b=boards[currentId]; if(!b) return;
  var goal=goalOf(b), filled=grapesOf(b);
  if(GROW_FOR!==goal){ GROW_ROWS=buildRows(goal); GROW_FOR=goal; }
  var cont=document.getElementById("cluster"); if(!cont) return;
  var html="", idx=0;
  for(var r=0;r<GROW_ROWS.length;r++){
    html+='<div class="grow-row">';
    for(var c=0;c<GROW_ROWS[r];c++){
      var isF=idx<filled, jp=(idx>=prevFilled&&idx<filled), mk=((idx+1)%5===0);
      html+='<div class="grape'+(isF?' filled':'')+(jp?' justpopped':'')+(mk?' mark':'')+'"></div>';
      idx++;
    }
    html+='</div>';
  }
  cont.innerHTML=html; prevFilled=filled;
}

/* ===== 연출 ===== */
function floatUp(text, golden){
  var card=document.getElementById("clusterCard"); if(!card) return;
  var el=document.createElement("div"); el.className="floatup"; el.textContent=text;
  if(golden) el.style.color="#e9b53d";
  card.appendChild(el); setTimeout(function(){ el.remove(); }, 1150);
}
function showDraw(ev){
  var overlay=document.getElementById("overlay"), reveal=document.getElementById("reveal");
  document.getElementById("revealClose").style.visibility="hidden";
  document.getElementById("revealBurst").textContent = ev.golden ? "✨" : "🎁";
  document.getElementById("revealTitle").textContent = "두구두구…";
  document.getElementById("revealSub").textContent = "포도알 뽑는 중!";
  reveal.className="reveal rolling"; overlay.classList.add("show");
  playSound("roll");
  setTimeout(function(){ revealResult(ev); }, 900);
}
function revealResult(ev){
  var reveal=document.getElementById("reveal");
  document.getElementById("revealClose").style.visibility="visible";
  var burst, title, sub, cls="reveal", flash=null;
  var urgent = ev.gainedReward ? false : (ev.remaining<=3 && ev.remaining>0);
  if(ev.gainedReward){
    burst="🏆"; title="목표 달성! 🎉"; sub="축하해요! 지금까지 "+ev.earned+"번 달성"; cls+=" lecture-pop"; flash="gold";
    playSound("lecture"); confetti(["🏆","🍇","🎉","🎊","✨"]);
  } else if(ev.golden){
    burst="🌟"; title="황금 포도알! +5 🌟"; sub= urgent ? ("목표까지 단 "+ev.remaining+"알!!") : ("완전 럭키! 목표까지 "+ev.remaining+"알"); cls+=" golden-pop"; flash="gold";
    playSound("golden"); confetti(["🌟","🍇","✨","💛"]);
  } else {
    burst="🍇".repeat(ev.n); title="+"+ev.n+" 포도알!"+(ev.n>=3?" 잭팟!":""); sub= urgent ? ("목표까지 단 "+ev.remaining+"알!! 🔥") : ("목표까지 "+ev.remaining+"알!");
    playSound(ev.n>=3?"jackpot":"pop"); if(ev.n>=3) confetti(["🍇","✨","🎉"]);
  }
  document.getElementById("revealBurst").textContent=burst;
  document.getElementById("revealTitle").textContent=title;
  document.getElementById("revealSub").textContent=sub;
  reveal.className=cls;
  if(flash) screenFlash(flash);
}
function closeReveal(){ document.getElementById("overlay").classList.remove("show"); }
function confetti(emojis){
  for(var i=0;i<26;i++){(function(){
    var el=document.createElement("div"); el.className="confetti";
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+"vw";
    var d=1.6+Math.random()*1.4; el.style.animation="fall "+d+"s linear forwards";
    el.style.fontSize=(16+Math.random()*16)+"px";
    document.body.appendChild(el); setTimeout(function(){ el.remove(); }, d*1000+100);
  })();}
}
function screenFlash(color){
  var f=document.createElement("div"); f.className="flash";
  if(color==="gold") f.style.background="#ffe9a8";
  document.body.appendChild(f);
  requestAnimationFrame(function(){ f.classList.add("go"); });
  setTimeout(function(){ f.remove(); }, 520);
}

/* ===== 효과음 ===== */
var actx=null, soundOn=true;
function ac(){ if(!soundOn) return null; try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); return actx; }catch(e){ return null; } }
function beep(f,s,d,t,v){ var c=ac(); if(!c) return; var o=c.createOscillator(),g=c.createGain(); o.type=t||"sine"; o.frequency.value=f; o.connect(g); g.connect(c.destination); var x=c.currentTime+(s||0); g.gain.setValueAtTime(0.0001,x); g.gain.exponentialRampToValueAtTime(v||0.16,x+0.02); g.gain.exponentialRampToValueAtTime(0.0001,x+d); o.start(x); o.stop(x+d+0.02); }
function playSound(k){
  if(!soundOn) return;
  if(k==="pop"){ beep(523,0,0.12,"triangle",0.15); beep(784,0.05,0.14,"triangle",0.13); }
  else if(k==="roll"){ [0,0.15,0.3,0.45].forEach(function(t){ beep(700,t,0.05,"square",0.07); }); }
  else if(k==="jackpot"){ [523,659,784,1047].forEach(function(f,i){ beep(f,i*0.08,0.18,"square",0.12); }); }
  else if(k==="golden"){ [659,831,988,1319,1568,1976].forEach(function(f,i){ beep(f,i*0.07,0.3,"triangle",0.14); }); }
  else if(k==="lecture"){ [523,659,784,1047,1319].forEach(function(f,i){ beep(f,i*0.1,0.32,"triangle",0.15); }); }
  else if(k==="bad"){ beep(220,0,0.18,"sawtooth",0.10); }
}

/* ===== 이벤트 ===== */
document.addEventListener("click", function(e){
  var t = e.target.closest("[data-action]"); if(!t) return;
  var a = t.dataset.action, id = t.dataset.id;
  if(a==="home"){ view="list"; currentId=null; render(); }
  else if(a==="admin"){ enterAdmin(); }
  else if(a==="open"){ currentId=id; view="detail"; prevFilled=0; render(); }
  else if(a==="create"){ doCreate(); }
  else if(a==="register"){ registerLink(currentId, (document.getElementById("linkInput")||{}).value||""); }
  else if(a==="toggle"){ expanded[id]=!expanded[id]; render(); }
  else if(a==="edit"){ editBoard(id); }
  else if(a==="delboard"){ deleteBoard(id); }
  else if(a==="dellink"){ deleteLink(id, t.dataset.key); }
});
document.addEventListener("keydown", function(e){
  if(e.key!=="Enter") return;
  var el=e.target;
  if(el.id==="linkInput"){ registerLink(currentId, el.value); }
  else if(el.id==="newBoardName" || el.id==="newBoardGoal"){ doCreate(); }
});
function doCreate(){
  var name=((document.getElementById("newBoardName")||{}).value||"").trim();
  var goal=Math.max(1, parseInt((document.getElementById("newBoardGoal")||{}).value,10)||30);
  if(name===""){ alert("보상판 이름을 입력해 주세요."); return; }
  createBoard(name, goal);
}
function enterAdmin(){
  if(ADMIN_PASS!==""){
    var p=window.prompt("관리자 비밀번호를 입력하세요");
    if(p===null) return;
    if(p!==ADMIN_PASS){ alert("비밀번호가 달라요."); return; }
  }
  view="admin"; render();
}
document.getElementById("revealClose").addEventListener("click", closeReveal);
document.getElementById("overlay").addEventListener("click", function(e){ if(e.target===this) closeReveal(); });

/* ===== 연결 + 데이터 구독 ===== */
function start(){
  if(fatal){ render(); return; }
  db.ref(".info/connected").on("value", function(s){
    var on=!!s.val();
    document.getElementById("connDot").className="dot "+(on?"on":"off");
    document.getElementById("connText").textContent= on?"연결됨":"오프라인";
  });
  db.ref("boards").on("value", function(snap){
    boards = snap.val() || {};
    render();
  }, function(err){
    fatal = err;
    var app=document.getElementById("app");
    var perm = (err.code==="PERMISSION_DENIED") || /permission/i.test(err.message||"");
    app.innerHTML = '<div class="card"><h2>🔒 데이터베이스 접근이 막혀 있어요</h2>'
      + '<p class="muted">'+esc(err.message||String(err))+'</p>'
      + (perm ? '<p>Firebase 콘솔 → Realtime Database → <b>규칙</b> 탭에서 아래처럼 바꿔주세요 (테스트용):</p>'
        + '<pre style="background:#2a2240;color:#eadcff;padding:12px;border-radius:12px;overflow:auto;">{\n  "rules": {\n    ".read": true,\n    ".write": true\n  }\n}</pre>'
        + '<p class="hint">※ 이 규칙은 누구나 읽고 쓸 수 있게 열어둡니다. 개인용 테스트엔 괜찮지만, 공개 공유 시엔 로그인 기반 규칙으로 바꿔야 해요.</p>' : '')
      + '</div>';
  });
}
start();
</script>

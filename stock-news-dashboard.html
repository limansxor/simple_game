<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 주식 뉴스 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0e1a;
    color: #e0e6f0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    background: linear-gradient(135deg, #0f1629 0%, #1a1f3a 100%);
    border-bottom: 1px solid rgba(99, 179, 237, 0.15);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #fff;
  }
  .header h1 {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .status-bar { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #94a3b8; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .countdown {
    background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2);
    border-radius: 6px; padding: 4px 10px;
    font-variant-numeric: tabular-nums; color: #38bdf8; font-weight: 500;
  }
  .fetch-btn {
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border: none; border-radius: 6px; padding: 6px 14px;
    color: #fff; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .fetch-btn:hover { opacity: 0.85; }
  .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .sector-tabs {
    display: flex; gap: 8px; padding: 16px 32px;
    overflow-x: auto; background: rgba(15,22,41,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .sector-tab {
    padding: 8px 18px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    cursor: pointer; font-size: 13px; font-weight: 500;
    white-space: nowrap; transition: all 0.25s; color: #94a3b8;
  }
  .sector-tab:hover { background: rgba(56,189,248,0.1); color: #e0e6f0; }
  .sector-tab.active {
    background: linear-gradient(135deg, rgba(56,189,248,0.2), rgba(129,140,248,0.2));
    border-color: rgba(56,189,248,0.4); color: #fff; font-weight: 700;
  }
  .sector-tab .count {
    display: inline-block; background: rgba(255,255,255,0.1);
    border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 6px;
  }
  .sector-tab.active .count { background: rgba(56,189,248,0.3); }

  .hero-section { padding: 32px; }
  .hero-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: #f87171; margin-bottom: 16px;
  }
  .hero-label .blink { width: 8px; height: 8px; border-radius: 50%; background: #f87171; animation: pulse 1s infinite; }
  .hero-card {
    background: linear-gradient(135deg, rgba(30,41,75,0.8), rgba(20,25,50,0.9));
    border: 1px solid rgba(99,179,237,0.15); border-radius: 16px;
    padding: 32px 36px; position: relative; overflow: hidden;
    transition: all 0.5s; cursor: pointer;
  }
  .hero-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #38bdf8, #818cf8, #f472b6);
  }
  .hero-card:hover {
    border-color: rgba(56,189,248,0.3); transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(56,189,248,0.1);
  }
  .hero-sector-badge {
    display: inline-block; padding: 4px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 600; margin-bottom: 14px;
  }
  .hero-title {
    font-size: 28px; font-weight: 900; line-height: 1.4;
    color: #fff; margin-bottom: 12px; animation: fadeSlideIn 0.6s ease;
  }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .hero-meta { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #64748b; }
  .hero-meta span { display: flex; align-items: center; gap: 4px; }

  .sector-highlights {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px; padding: 0 32px 24px;
  }
  .sector-card {
    background: rgba(20,28,55,0.6); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 20px; transition: all 0.3s; cursor: pointer;
  }
  .sector-card:hover {
    border-color: rgba(56,189,248,0.2); background: rgba(25,35,65,0.8);
    transform: translateY(-1px);
  }
  .sector-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sector-card-badge { padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .sector-card-time { font-size: 11px; color: #64748b; }
  .sector-card-title {
    font-size: 15px; font-weight: 600; line-height: 1.5; color: #cbd5e1;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .sector-card:hover .sector-card-title { color: #fff; }

  .log-section { padding: 0 32px 32px; }
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .log-header h2 { font-size: 16px; font-weight: 700; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
  .log-total { font-size: 12px; color: #64748b; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; }
  .log-list { display: flex; flex-direction: column; gap: 4px; max-height: 600px; overflow-y: auto; }
  .log-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 8px; background: rgba(255,255,255,0.02);
    transition: background 0.2s; cursor: pointer; animation: logFadeIn 0.4s ease;
  }
  @keyframes logFadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  .log-item:hover { background: rgba(255,255,255,0.05); }
  .log-item-time { font-size: 11px; color: #475569; min-width: 72px; font-variant-numeric: tabular-nums; }
  .log-item-sector { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; min-width: 56px; text-align: center; }
  .log-item-title { font-size: 13px; color: #94a3b8; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-item:hover .log-item-title { color: #e0e6f0; }
  .log-item-new { background: rgba(56,189,248,0.05); border-left: 2px solid #38bdf8; }

  .s-tech { background: rgba(56,189,248,0.15); color: #38bdf8; }
  .s-finance { background: rgba(250,204,21,0.15); color: #facc15; }
  .s-bio { background: rgba(52,211,153,0.15); color: #34d399; }
  .s-energy { background: rgba(251,146,60,0.15); color: #fb923c; }
  .s-industry { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .s-consumer { background: rgba(244,114,182,0.15); color: #f472b6; }
  .s-crypto { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .s-general { background: rgba(148,163,184,0.15); color: #94a3b8; }

  .spinner { width: 40px; height: 40px; border: 3px solid rgba(56,189,248,0.1); border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-hero { text-align: center; padding: 60px; color: #475569; font-size: 15px; }
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; color: #64748b; }

  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .sector-tabs { padding: 12px 16px; }
    .hero-section { padding: 20px 16px; }
    .hero-title { font-size: 20px; }
    .sector-highlights { padding: 0 16px 16px; grid-template-columns: 1fr; }
    .log-section { padding: 0 16px 24px; }
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <h1>실시간 주식 뉴스 대시보드</h1>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span id="lastUpdate">수집 대기 중...</span>
    <div class="countdown" id="countdown">3:00</div>
    <button class="fetch-btn" id="fetchBtn" onclick="manualFetch()">지금 수집</button>
  </div>
</div>

<div class="sector-tabs" id="sectorTabs"></div>

<div class="hero-section" id="heroSection">
  <div class="empty-hero"><div class="spinner"></div><p>뉴스를 수집하는 중입니다...</p></div>
</div>

<div class="sector-highlights" id="sectorHighlights"></div>

<div class="log-section">
  <div class="log-header">
    <h2>📋 수집 로그</h2>
    <span class="log-total" id="logTotal">총 0건</span>
  </div>
  <div class="log-list" id="logList">
    <div class="loading-state"><div class="spinner"></div><p>첫 번째 수집을 기다리고 있습니다...</p></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  섹터 정의
// ═══════════════════════════════════════════
const SECTORS = {
  all:      { label: '전체',       cls: 's-general',  icon: '📊' },
  tech:     { label: 'IT/기술',    cls: 's-tech',     icon: '💻', keywords: ['삼성전자','SK하이닉스','네이버','카카오','반도체','AI','인공지능','테크','tech','apple','nvidia','microsoft','google','meta','TSMC','엔비디아','애플','마이크로소프트','구글','IT','소프트웨어','클라우드','데이터센터','GPU','칩','CPU'] },
  finance:  { label: '금융',       cls: 's-finance',  icon: '🏦', keywords: ['은행','증권','보험','금리','KB','신한','하나','우리','기준금리','연준','Fed','금융','대출','예금','채권','국채','환율','달러','원화','외환','펀드','자산운용'] },
  bio:      { label: '바이오/헬스', cls: 's-bio',     icon: '🧬', keywords: ['바이오','제약','의료','셀트리온','삼성바이오','헬스케어','신약','임상','FDA','의약품','백신','치료제','진단','병원','건강'] },
  energy:   { label: '에너지',     cls: 's-energy',   icon: '⚡', keywords: ['에너지','석유','원유','가스','태양광','풍력','배터리','2차전지','LG에너지','수소','전기차','EV','충전','신재생','친환경','탄소'] },
  industry: { label: '산업재',     cls: 's-industry', icon: '🏭', keywords: ['현대차','기아','조선','건설','철강','포스코','현대중공업','자동차','HD한국조선','산업','제조','공장','생산','수출','무역'] },
  consumer: { label: '소비재',     cls: 's-consumer', icon: '🛒', keywords: ['소비','유통','식품','의류','화장품','아모레','LG생활','CJ','롯데','쿠팡','이마트','패션','뷰티','F&B','음식','브랜드'] },
  crypto:   { label: '가상자산',   cls: 's-crypto',   icon: '₿', keywords: ['비트코인','이더리움','코인','가상자산','암호화폐','업비트','빗썸','블록체인','토큰','NFT','디파이','크립토','bitcoin','ethereum','crypto'] }
};

// ═══════════════════════════════════════════
//  설정
// ═══════════════════════════════════════════
const INTERVAL_SEC = 180;           // 3분 간격
const TITLE_EXPIRE_MS = 30 * 60000; // 30분 뒤 중복 제목 허용 (같은 기사라도 재등장)

// ═══════════════════════════════════════════
//  상태
// ═══════════════════════════════════════════
let allNews = [];
let seenMap = new Map();  // title → timestamp (만료 기반 중복 관리)
let activeSector = 'all';
let countdownSec = INTERVAL_SEC;
let fetchRound = 0;
let isFetching = false;

// ═══════════════════════════════════════════
//  피드 풀 — 매 수집마다 랜덤 6개를 골라 사용
//  검색어를 다양하게 두어 항상 다른 결과가 나오도록
// ═══════════════════════════════════════════
const FEED_POOL = [
  // 한국 종합
  { q: '주식 시장 오늘',      tag: '증시' },
  { q: '코스피 코스닥',       tag: '증시' },
  { q: '증시 전망',           tag: '증시' },
  { q: '주식 상승 하락',      tag: '증시' },
  // IT
  { q: '반도체 주식',         tag: 'IT' },
  { q: 'AI 인공지능 주가',    tag: 'IT' },
  { q: '삼성전자 SK하이닉스',  tag: 'IT' },
  { q: '네이버 카카오 주가',   tag: 'IT' },
  // 바이오
  { q: '바이오 제약 주식',     tag: '바이오' },
  { q: '셀트리온 삼성바이오',   tag: '바이오' },
  // 에너지
  { q: '에너지 배터리 주식',   tag: '에너지' },
  { q: '2차전지 전기차',       tag: '에너지' },
  // 금융
  { q: '금리 환율 금융',       tag: '금융' },
  { q: '은행 증권 보험',       tag: '금융' },
  // 산업
  { q: '현대차 조선 건설',     tag: '산업' },
  { q: '수출 무역 산업재',     tag: '산업' },
  // 소비
  { q: '소비재 유통 식품',     tag: '소비' },
  // 크립토
  { q: '비트코인 가상자산',    tag: '크립토' },
  { q: '이더리움 코인 시세',   tag: '크립토' },
  // 글로벌
  { q: 'stock market today',  tag: '글로벌', lang: 'en' },
  { q: 'nvidia apple stock',  tag: '글로벌', lang: 'en' },
  { q: 'S&P 500 nasdaq',      tag: '글로벌', lang: 'en' },
];

function pickRandomFeeds(n) {
  const shuffled = [...FEED_POOL].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function buildGoogleRssUrl(q, lang) {
  const isEn = lang === 'en';
  const hl = isEn ? 'en' : 'ko';
  const gl = isEn ? 'US' : 'KR';
  const ceid = isEn ? 'US:en' : 'KR:ko';
  return `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=${hl}&gl=${gl}&ceid=${ceid}`;
}

// ═══════════════════════════════════════════
//  섹터 분류
// ═══════════════════════════════════════════
function classifySector(title) {
  const t = title.toLowerCase();
  for (const [key, sec] of Object.entries(SECTORS)) {
    if (key === 'all') continue;
    if (sec.keywords && sec.keywords.some(kw => t.includes(kw.toLowerCase()))) return key;
  }
  return 'general';
}
function sectorInfo(key) { return SECTORS[key] || SECTORS.all; }

// ═══════════════════════════════════════════
//  시간 포맷 — 뉴스 발행(pubDate) 기준
// ═══════════════════════════════════════════
function formatPubTime(date) {
  const now = new Date();
  const diff = now - date;
  const mins = Math.floor(diff / 60000);
  const hrs  = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  // 상대 시간
  let ago;
  if (mins < 1)       ago = '방금';
  else if (mins < 60) ago = `${mins}분 전`;
  else if (hrs < 24)  ago = `${hrs}시간 전`;
  else if (days < 7)  ago = `${days}일 전`;
  else                ago = `${date.getMonth()+1}/${date.getDate()}`;

  // 절대 시간 (오늘이면 시:분, 아닌 날이면 월/일 시:분)
  const hh = date.getHours().toString().padStart(2,'0');
  const mm = date.getMinutes().toString().padStart(2,'0');
  const isToday = now.toDateString() === date.toDateString();
  const abs = isToday
    ? `${hh}:${mm}`
    : `${date.getMonth()+1}/${date.getDate()} ${hh}:${mm}`;

  return { ago, abs, full: `${ago} (${abs})` };
}

// ═══════════════════════════════════════════
//  중복 관리 (시간 경과 후 같은 제목 재등장 허용)
// ═══════════════════════════════════════════
function cleanExpiredTitles() {
  const now = Date.now();
  for (const [title, ts] of seenMap) {
    if (now - ts > TITLE_EXPIRE_MS) seenMap.delete(title);
  }
}

function isSeen(title) {
  return seenMap.has(title);
}

function markSeen(title) {
  seenMap.set(title, Date.now());
}

// ═══════════════════════════════════════════
//  데이터 수집 — 캐시 우회 + 랜덤 피드
// ═══════════════════════════════════════════
async function fetchAllFeeds() {
  cleanExpiredTitles();
  const picks = pickRandomFeeds(6);
  const results = [];
  const cacheBust = Date.now(); // 캐시 우회용 타임스탬프

  const promises = picks.map(async (feed) => {
    try {
      const rssUrl = buildGoogleRssUrl(feed.q, feed.lang);
      // rss2json에 캐시 우회 파라미터 추가
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&_t=${cacheBust}&_r=${Math.random()}`;
      const resp = await fetch(apiUrl);
      const data = await resp.json();
      if (data.status === 'ok' && data.items) {
        data.items.forEach(item => {
          let title = item.title || '';
          // Google News 특유의 " - 출처" 제거
          title = title.replace(/\s*-\s*[^-]+$/, '').trim();
          if (!title || isSeen(title)) return;
          markSeen(title);
          results.push({
            id: Date.now() + '-' + Math.random().toString(36).slice(2, 8),
            title,
            sector: classifySector(title),
            time: new Date(item.pubDate || Date.now()),
            link: item.link || '#',
            source: item.author || feed.tag,
            isNew: true
          });
        });
      }
    } catch (e) {
      console.warn(`Feed error (${feed.tag}):`, e.message);
    }
  });

  await Promise.allSettled(promises);
  return results;
}

// ═══════════════════════════════════════════
//  뉴스 수집 메인
// ═══════════════════════════════════════════
async function collectNews() {
  if (isFetching) return;
  isFetching = true;
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '수집 중...';
  fetchRound++;

  // 기존 뉴스 isNew 초기화
  allNews.forEach(n => n.isNew = false);

  const fresh = await fetchAllFeeds();
  fresh.sort((a, b) => b.time - a.time);
  allNews = [...fresh, ...allNews];

  // 로그 최대 500건 유지
  if (allNews.length > 500) allNews = allNews.slice(0, 500);

  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  document.getElementById('lastUpdate').textContent =
    `마지막 수집: ${ts} (${fetchRound}회차 · +${fresh.length}건)`;

  renderAll();
  countdownSec = INTERVAL_SEC;
  isFetching = false;
  btn.disabled = false;
  btn.textContent = '지금 수집';
}

function manualFetch() { collectNews(); }

// ═══════════════════════════════════════════
//  필터
// ═══════════════════════════════════════════
function filtered() {
  if (activeSector === 'all') return allNews;
  return allNews.filter(n => n.sector === activeSector);
}

// ═══════════════════════════════════════════
//  렌더링
// ═══════════════════════════════════════════
function renderAll() { renderTabs(); renderHero(); renderSectorHighlights(); renderLog(); }

function renderTabs() {
  const el = document.getElementById('sectorTabs');
  const counts = { all: allNews.length };
  allNews.forEach(n => { counts[n.sector] = (counts[n.sector] || 0) + 1; });
  el.innerHTML = Object.entries(SECTORS).map(([key, sec]) => {
    const cnt = counts[key] || 0;
    return `<div class="sector-tab ${activeSector === key ? 'active' : ''}" onclick="switchSector('${key}')">
      ${sec.icon} ${sec.label}<span class="count">${cnt}</span></div>`;
  }).join('');
}

function renderHero() {
  const el = document.getElementById('heroSection');
  const list = filtered();
  if (!list.length) {
    el.innerHTML = '<div class="empty-hero"><div class="spinner"></div><p>뉴스를 수집하는 중입니다...</p></div>';
    return;
  }
  const latest = list[0];
  const sec = sectorInfo(latest.sector);
  const pub = formatPubTime(latest.time);
  el.innerHTML = `
    <div class="hero-label"><div class="blink"></div> 최신 헤드라인</div>
    <div class="hero-card" onclick="window.open('${latest.link}','_blank')">
      <span class="hero-sector-badge ${sec.cls}">${sec.icon} ${sec.label}</span>
      <div class="hero-title">${latest.title}</div>
      <div class="hero-meta">
        <span>🕐 ${pub.ago}</span>
        <span style="color:#475569;font-size:11px;">${pub.abs}</span>
        <span>📰 ${latest.source}</span>
        ${latest.isNew ? '<span style="color:#38bdf8;font-weight:600">✨ NEW</span>' : ''}
      </div>
    </div>`;
}

function renderSectorHighlights() {
  const el = document.getElementById('sectorHighlights');
  if (activeSector !== 'all') { el.innerHTML = ''; return; }
  const cards = [];
  for (const [key, sec] of Object.entries(SECTORS)) {
    if (key === 'all') continue;
    const latest = allNews.find(n => n.sector === key);
    if (!latest) continue;
    const pub = formatPubTime(latest.time);
    cards.push(`<div class="sector-card" onclick="window.open('${latest.link}','_blank')">
      <div class="sector-card-header">
        <span class="sector-card-badge ${sec.cls}">${sec.icon} ${sec.label}</span>
        <span class="sector-card-time">${pub.ago}</span>
      </div>
      <div class="sector-card-title">${latest.title}</div>
    </div>`);
  }
  el.innerHTML = cards.join('');
}

function renderLog() {
  const el = document.getElementById('logList');
  const list = filtered();
  document.getElementById('logTotal').textContent = `총 ${list.length}건`;
  if (!list.length) {
    el.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>첫 번째 수집을 기다리고 있습니다...</p></div>';
    return;
  }
  el.innerHTML = list.slice(1).map(n => {
    const sec = sectorInfo(n.sector);
    const pub = formatPubTime(n.time);
    return `<div class="log-item ${n.isNew ? 'log-item-new' : ''}" onclick="window.open('${n.link}','_blank')">
      <span class="log-item-time" title="${pub.abs}">${pub.ago}</span>
      <span class="log-item-sector ${sec.cls}">${sec.label}</span>
      <span class="log-item-title">${n.title}</span>
    </div>`;
  }).join('');
}

function switchSector(key) { activeSector = key; renderAll(); }

// ═══════════════════════════════════════════
//  카운트다운 타이머
// ═══════════════════════════════════════════
function tickCountdown() {
  countdownSec--;
  if (countdownSec <= 0) collectNews();
  const mm = Math.floor(countdownSec / 60);
  const ss = countdownSec % 60;
  document.getElementById('countdown').textContent = `${mm}:${ss.toString().padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
//  초기화
// ═══════════════════════════════════════════
(async function init() {
  await collectNews();
  setInterval(tickCountdown, 1000);
})();
</script>
</body>
</html>

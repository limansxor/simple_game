// 좌표 변환
const LON_MIN=-10.2,LON_MAX=4.2,LAT_MIN=35.3,LAT_MAX=44.2;
const LON_C=(LON_MIN+LON_MAX)/2,LAT_C=(LAT_MIN+LAT_MAX)/2;
const COSLAT=Math.cos(LAT_C*Math.PI/180),S=13;
const PW=(LON_MAX-LON_MIN)*COSLAT*S,PD=(LAT_MAX-LAT_MIN)*S;
function geoToWorld(lon,lat){return{x:(lon-LON_C)*COSLAT*S,z:-(lat-LAT_C)*S};}
function qbez(p0,p1,p2,t){const u=1-t;return new THREE.Vector3(u*u*p0.x+2*u*t*p1.x+t*t*p2.x,u*u*p0.y+2*u*t*p1.y+t*t*p2.y,u*u*p0.z+2*u*t*p1.z+t*t*p2.z);}
// Web Mercator: 위경도 → 타일좌표 (실제 지도 정렬용)
function lon2tx(lon,z){return (lon+180)/360*Math.pow(2,z);}
function lat2ty(lat,z){const r=lat*Math.PI/180;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z);}
// 정규화 Mercator (0~1) — 바운딩박스 자동맞춤용
function mlon(lon){return (lon+180)/360;}
function mlat(lat){const r=lat*Math.PI/180;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2;}
const IBERIA=[[-8.9,43.7],[-7.6,43.8],[-5.8,43.6],[-3.8,43.5],[-1.8,43.4],[-1.4,43.3],[0.7,42.7],[2.2,42.4],[3.3,42.3],[1.0,41.1],[0.0,40.0],[-0.3,39.5],[-0.2,38.8],[-0.6,38.2],[-1.0,37.6],[-1.9,37.2],[-2.9,36.7],[-4.4,36.7],[-5.4,36.1],[-6.3,36.3],[-7.0,37.0],[-7.4,37.2],[-8.0,37.1],[-8.9,37.0],[-8.8,38.0],[-9.1,38.7],[-8.8,39.4],[-8.9,40.2],[-8.7,41.1],[-8.8,41.9],[-9.0,43.0],[-8.9,43.7]];
// 스페인-포르투갈 국경 (포르투갈 동쪽 경계, 북 미뉴강 ~ 남 과디아나강)
const BORDER=[[-8.88,41.92],[-8.2,42.02],[-6.95,41.03],[-6.78,40.23],[-7.02,39.66],[-7.34,39.47],[-7.0,38.9],[-7.27,38.45],[-7.0,38.02],[-7.44,37.38],[-7.4,37.18]];
const CW=1024,CH=Math.round(CW*PD/PW);
function geoToCanvas(lon,lat){return{x:(lon-LON_MIN)/(LON_MAX-LON_MIN)*CW,y:(LAT_MAX-lat)/(LAT_MAX-LAT_MIN)*CH};}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

function buildMapTexture(){
  const cv=document.createElement('canvas');cv.width=CW;cv.height=CH;const g=cv.getContext('2d');
  const sea=g.createLinearGradient(0,0,0,CH);sea.addColorStop(0,'#13435f');sea.addColorStop(1,'#0d2c40');
  g.fillStyle=sea;g.fillRect(0,0,CW,CH);
  g.strokeStyle='#ffffff10';g.lineWidth=1;
  for(let lo=-10;lo<=4;lo+=2){const a=geoToCanvas(lo,LAT_MIN),b=geoToCanvas(lo,LAT_MAX);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke();}
  for(let la=36;la<=44;la+=2){const a=geoToCanvas(LON_MIN,la),b=geoToCanvas(LON_MAX,la);g.beginPath();g.moveTo(a.x,a.y);g.lineTo(b.x,b.y);g.stroke();}
  g.beginPath();IBERIA.forEach((p,i)=>{const c=geoToCanvas(p[0],p[1]);i?g.lineTo(c.x,c.y):g.moveTo(c.x,c.y);});g.closePath();
  const land=g.createLinearGradient(0,0,CW,CH);land.addColorStop(0,'#caa86e');land.addColorStop(.5,'#d9bd86');land.addColorStop(1,'#c69f63');
  g.fillStyle=land;g.shadowColor='#00000055';g.shadowBlur=24;g.fill();g.shadowBlur=0;g.strokeStyle='#8a6b3e';g.lineWidth=2.5;g.stroke();
  // 국경선 (스페인 / 포르투갈)
  g.strokeStyle='#6e4a22';g.lineWidth=3.5;g.setLineDash([8,6]);g.beginPath();
  BORDER.forEach((p,i)=>{const c=geoToCanvas(p[0],p[1]);i?g.lineTo(c.x,c.y):g.moveTo(c.x,c.y);});g.stroke();g.setLineDash([]);
  g.fillStyle='#5a3f1e88';g.font='bold 30px sans-serif';g.textAlign='center';
  const es=geoToCanvas(-1.6,41.6);g.fillText('ESPAÑA',es.x,es.y);
  const pt=geoToCanvas(-8.25,39.9);g.save();g.translate(pt.x,pt.y);g.rotate(-Math.PI/2);g.fillText('PORTUGAL',0,0);g.restore();
  // 바다 이름 (서쪽=대서양, 남동쪽=지중해)
  g.fillStyle='#bfe0efcc';g.font='italic bold 25px sans-serif';g.textAlign='center';
  const atl=geoToCanvas(-9.92,40.9);g.save();g.translate(atl.x,atl.y);g.rotate(-Math.PI/2);g.fillText('대서양  ATLANTIC',0,0);g.restore();
  const med=geoToCanvas(1.9,38.6);g.save();g.translate(med.x,med.y);g.rotate(-0.32);g.fillText('지중해  MEDITERRANEAN',0,0);g.restore();
  g.strokeStyle='#ffffffcc';g.lineWidth=3;g.setLineDash([10,8]);g.beginPath();
  CITIES.forEach((c,i)=>{const p=geoToCanvas(c.lon,c.lat);i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y);});g.stroke();g.setLineDash([]);
  CITIES.forEach(c=>{const p=geoToCanvas(c.lon,c.lat);g.fillStyle='#0c1620cc';g.font='bold 22px sans-serif';g.textAlign='left';
    const w=g.measureText(c.name).width;g.fillRect(p.x+10,p.y-12,w+12,26);g.fillStyle='#fff';g.fillText(c.name,p.x+16,p.y+6);});
  return new THREE.CanvasTexture(cv);
}

let mode='map',rotY=0.35,elev=0.82,idle=true,curDist=235,tgtX=0,tgtZ=0;

function init(){
  scene=new THREE.Scene();scene.background=new THREE.Color(0x0c1620);
  scene.fog=new THREE.Fog(0x0c1620,320,700);
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,3000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);
  document.getElementById('app').appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,0.62));
  const key=new THREE.DirectionalLight(0xfff0dd,0.95);key.position.set(-60,140,60);scene.add(key);
  const fill=new THREE.DirectionalLight(0x88bbff,0.35);fill.position.set(80,60,-40);scene.add(fill);

  mapG=new THREE.Group();scene.add(mapG);
  const tex=buildMapTexture();tex.anisotropy=8;
  const map=new THREE.Mesh(new THREE.PlaneGeometry(PW,PD),new THREE.MeshStandardMaterial({map:tex,roughness:.95}));
  map.rotation.x=-Math.PI/2;mapG.add(map);
  const slab=new THREE.Mesh(new THREE.BoxGeometry(PW,6,PD),new THREE.MeshStandardMaterial({color:0x2a3947,roughness:1}));
  slab.position.y=-3.2;mapG.add(slab);

  CITIES.forEach(c=>{
    const w=geoToWorld(c.lon,c.lat);
    const g=makePiece(NIGHTS[c.key]||1,c.hex);
    g.position.set(w.x,0,w.z);g.userData.city=c;g.userData.base=0;mapG.add(g);pawns.push(g);
    const disc=new THREE.Mesh(new THREE.CircleGeometry(4.6,32),new THREE.MeshBasicMaterial({color:c.hex,transparent:true,opacity:.45}));
    disc.rotation.x=-Math.PI/2;disc.position.set(w.x,.3,w.z);mapG.add(disc);
    // 체스말 위 도착/출발 시각표 + 현지 날씨
    const tag=makeTimeTag(c);
    tag.position.set(w.x,{1:15,2:18,3:21}[NIGHTS[c.key]||1],w.z);mapG.add(tag);
    fetchWeather(c,tag);
  });

  // 입국 비행기 (마드리드), 출국 비행기 (리스본)
  const mad=geoToWorld(-3.70,40.42), lis=geoToWorld(-9.14,38.72);
  const arrival=makeAirplane(0xe0563f);arrival.userData.kind='arrival';
  arrival.userData.path=t=>{const e=new THREE.Vector3(mad.x,9,mad.z),s=new THREE.Vector3(mad.x-70,78,mad.z-86);return s.lerp(e,t);};
  mapG.add(arrival);planes.push(arrival);
  const dep=makeAirplane(0xf2c64b);dep.userData.kind='departure';
  dep.userData.path=t=>{const s=new THREE.Vector3(lis.x,9,lis.z),e=new THREE.Vector3(lis.x-66,82,lis.z-92);return s.lerp(e,t);};
  mapG.add(dep);planes.push(dep);
  // 바르셀로나 → 포르투 (Vueling, 7/4) — 아치형 비행
  const bcn=geoToWorld(2.17,41.39), por=geoToWorld(-8.61,41.15);
  const hop=makeAirplane(0x9fd0e0);hop.userData.kind='hop';hop.userData.p=0.0;
  hop.userData.path=t=>qbez(new THREE.Vector3(bcn.x,9,bcn.z),new THREE.Vector3((bcn.x+por.x)/2,56,(bcn.z+por.z)/2-8),new THREE.Vector3(por.x,9,por.z),t);
  mapG.add(hop);planes.push(hop);
  // 마드리드 → 세비야 기차 (AVE, 6/29) — 지면 위 주행
  const sev=geoToWorld(-5.99,37.39);
  const train=makeTrain(0xc2ccd4);train.userData.kind='train';
  train.userData.path=t=>new THREE.Vector3(mad.x,1.2,mad.z).lerp(new THREE.Vector3(sev.x,1.2,sev.z),t);
  mapG.add(train);planes.push(train);
  // 포르투 → 리스본 버스 (FlixBus, 7/6) — 지면 위 주행
  const bus=makeBus(0xe0a030);bus.userData.kind='bus';
  bus.userData.path=t=>new THREE.Vector3(por.x,1.2,por.z).lerp(new THREE.Vector3(lis.x,1.2,lis.z),t);
  mapG.add(bus);planes.push(bus);
  // 세비야 → 바르셀로나 기차 (AVE, 7/1)
  const train2=makeTrain(0xc2ccd4);train2.userData.kind='train';
  train2.userData.path=t=>new THREE.Vector3(sev.x,1.2,sev.z).lerp(new THREE.Vector3(bcn.x,1.2,bcn.z),t);
  mapG.add(train2);planes.push(train2);
  // 각 탈것의 진행 방향을 생성 시점에 시작점→목표점으로 한 번 고정
  planes.forEach(pl=>{pl.userData.fixedDir=pathDirFlat(pl.userData.path);pl.userData.spd=16*0.016/pathLen(pl.userData.path);});

  raycaster=new THREE.Raycaster();pointer=new THREE.Vector2();
  updateCamera();document.getElementById('loading').style.display='none';
  bindEvents();buildLegend();animate();
}

// 세부장면 좌표(월드 x,z) → 지도 캔버스 픽셀 (플레인 UV와 정렬)
function el(x,z){return[(x+40)*6.4,(z+40)*6.4];}
// 실제 OSM 지도 — 바운딩박스(rMinX,rMinY,size)에 꼭 맞춰 타일을 그림
function makeMapGround(rMinX,rMinY,size,z){
  const cv=document.createElement('canvas');cv.width=512;cv.height=512;const c=cv.getContext('2d');
  const tex=new THREE.CanvasTexture(cv);const tiles=[];const n=Math.pow(2,z);
  function rect(tx,ty){const x0=((tx/n-rMinX)/size)*512,x1=(((tx+1)/n-rMinX)/size)*512,y0=((ty/n-rMinY)/size)*512,y1=(((ty+1)/n-rMinY)/size)*512;return [x0,y0,x1-x0,y1-y0];}
  function redraw(){
    c.save();c.beginPath();c.arc(256,256,256,0,7);c.clip();
    c.fillStyle='#2a3138';c.fillRect(0,0,512,512);
    tiles.forEach(t=>{const r=rect(t.tx,t.ty);c.drawImage(t.img,r[0],r[1],r[2],r[3]);});
    c.fillStyle='#0c162022';c.fillRect(0,0,512,512);
    const rg=c.createRadialGradient(256,256,184,256,256,256);rg.addColorStop(0,'#00000000');rg.addColorStop(1,'#0c1620dd');c.fillStyle=rg;c.fillRect(0,0,512,512);
    c.restore();tex.needsUpdate=true;
  }
  redraw();
  const tx0=Math.floor(rMinX*n),tx1=Math.floor((rMinX+size)*n),ty0=Math.floor(rMinY*n),ty1=Math.floor((rMinY+size)*n);
  for(let tx=tx0;tx<=tx1;tx++)for(let ty=ty0;ty<=ty1;ty++){
    const img=new Image();img.crossOrigin='anonymous';
    (function(TX,TY,im){im.onload=function(){tiles.push({img:im,tx:TX,ty:TY});redraw();};})(tx,ty,img);
    img.src='https://tile.openstreetmap.org/'+z+'/'+tx+'/'+ty+'.png';
  }
  const grp=new THREE.Group();
  const base=new THREE.Mesh(new THREE.CylinderGeometry(40,40,1.2,64),new THREE.MeshStandardMaterial({color:0x222a31,roughness:1}));base.position.y=-0.6;grp.add(base);
  const plane=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({map:tex,transparent:true,roughness:1}));
  plane.rotation.x=-Math.PI/2;plane.position.y=0.02;grp.add(plane);
  return grp;
}
function buildDetail(city){
  const D=DETAILS[city.key];

  const mpts=[];D.items.forEach(it=>{if(it.g)mpts.push([mlon(it.g[1]),mlat(it.g[0])]);});
  const minX=Math.min.apply(null,mpts.map(p=>p[0])),maxX=Math.max.apply(null,mpts.map(p=>p[0]));
  const minY=Math.min.apply(null,mpts.map(p=>p[1])),maxY=Math.max.apply(null,mpts.map(p=>p[1]));
  const cX=(minX+maxX)/2,cY=(minY+maxY)/2;
  const size=Math.max(maxX-minX,maxY-minY,1e-5)*1.7; // 패딩 70%
  const rMinX=cX-size/2,rMinY=cY-size/2;
  function geoXZ(lat,lon){return [((mlon(lon)-rMinX)/size)*512/6.4-40, ((mlat(lat)-rMinY)/size)*512/6.4-40];}

  g.add(makeMapGround(rMinX,rMinY,size,z)); // 실제 OSM 지도 바닥 (자동맞춤)

  rim.rotation.x=Math.PI/2;g.add(rim);
  billboards=[];arrows=[];fountains=[];bobbers=[];dPick=[];dVehicles=[];
  const POS=[];
  D.items.forEach((it,idx)=>{
    const pp=it.g?geoXZ(it.g[0],it.g[1]):it.pos; POS[idx]=pp; const px=pp[0],pz=pp[1];
    let obj;

    else if(it.type==='fountain')obj=makeFountain();
    else if(it.type==='park')obj=makePark();
    else if(it.type==='ticket')obj=makeTicket();
    else if(it.type==='camera')obj=makeCamera();
    else if(it.type==='billboard')obj=makeBillboard(it.img,it.label);
    else if(it.type==='airport')obj=makeAirport();
    else if(it.type==='tower')obj=makeTower(it.color);
    else if(it.type==='spires')obj=makeSpires(it.color);
    else if(it.type==='bridge')obj=makeBridge(it.color);
    else obj=makeBuilding(0x999999);
    const SC={airport:0.24,station:0.22,building:0.24,landmark:0.24,wine:0.24,fountain:0.28,park:0.32,ticket:0.46,camera:0.4,billboard:0.44,tower:0.3,spires:0.32,bridge:0.3}[it.type]||0.26;
    obj.scale.setScalar(SC);

    const icon={building:'🏨',landmark:'🏛️',wine:'🍷',station:'🚉',fountain:'⛲',park:'🌳',ticket:'🎟️',camera:'📷',billboard:'🖼️',airport:'✈️',tower:'🗼',spires:'⛪',bridge:'🌉'}[it.type]||'📍';
    const lb=makeLabel(icon+' '+it.label,'#0c1620e6');
    const ly={billboard:12,station:4,building:4.5,landmark:4.5,wine:4.5,airport:4,park:4,fountain:4,ticket:4,camera:3.5,tower:6,spires:6.5,bridge:4}[it.type]||4.5;
    lb.position.set(px,ly,pz);g.add(lb);
    obj.userData.pick={label:it.label,sub:it.sub,photos:it.photos,icon:icon};dPick.push(obj);
  });
  // 도보 동선(청록 투톤) + 픽업(주황) + 순번 뱃지 — 인덱스로 위치 참조
  const routePts=D.route.map(i=>POS[i]).filter(Boolean);
  g.add(makeArrowFlow(routePts,0x18d6c2,0x0b7d74));

    if(pts.length>=2){
      const path=pts.map(p=>new THREE.Vector3(p[0],1.4,p[1]));
      const at=function(t){const seg=(path.length-1)*t;const i=Math.min(Math.floor(seg),path.length-2);return path[i].clone().lerp(path[i+1],seg-i);};
      const lpts=[];for(let k=0;k<=40;k++)lpts.push(at(k/40));
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lpts),new THREE.LineBasicMaterial({color:0xffce6a,transparent:true,opacity:.55})));
      const pbus=makeBus(0xffb020);pbus.scale.setScalar(0.4);
      pbus.userData.path=at;pbus.userData.fixedDir=pathDirFlat(at);pbus.userData.spd=12*0.016/pathLen(at);

  g.add(veh);dVehicles.push(veh);
  // 출국 비행기 (이륙) — 공항에서 솟아올라 바깥으로

}

let dragging=false,moved=false,lx=0,ly=0;
function bindEvents(){
  const el=renderer.domElement;
  const ptrs=new Map();let pinchD=0;
  function ptrDist(){const a=[...ptrs.values()];return Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);}
  function zoomBy(f){idle=false;curDist*=f;const lim=(mode==='detail')?[26,180]:[140,360];curDist=Math.max(lim[0],Math.min(lim[1],curDist));updateCamera();}
  el.addEventListener('pointerdown',e=>{ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});dragging=true;moved=false;idle=false;lx=e.clientX;ly=e.clientY;if(ptrs.size===2)pinchD=ptrDist();});
  el.addEventListener('pointermove',e=>{
    if(ptrs.has(e.pointerId))ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size>=2){const d=ptrDist();if(pinchD>0)zoomBy(pinchD/d);pinchD=d;moved=true;return;} // 두 손가락 핀치 줌
    if(!dragging)return;const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;if(Math.abs(dx)+Math.abs(dy)>2)moved=true;rotY+=dx*0.006;elev+=dy*0.004;updateCamera();
  });
  el.addEventListener('pointerup',e=>{const wasMulti=ptrs.size>=2;ptrs.delete(e.pointerId);if(ptrs.size<2)pinchD=0;dragging=ptrs.size>0;if(ptrs.size===0&&!moved&&!wasMulti)pick(e);});
  el.addEventListener('pointercancel',e=>{ptrs.delete(e.pointerId);if(ptrs.size<2)pinchD=0;dragging=ptrs.size>0;});
  el.addEventListener('wheel',e=>{e.preventDefault();zoomBy(Math.exp(e.deltaY*0.0016));},{passive:false});
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  document.getElementById('p-close').onclick=()=>closePopup();
  document.getElementById('p-prev').onclick=()=>step(-1);
  document.getElementById('p-next').onclick=()=>step(1);
  document.getElementById('p-detail').onclick=()=>{if(curCity&&curCity.detail)enterDetail(curCity);};
  document.getElementById('backbtn').onclick=exitDetail;
  document.getElementById('dphoto-x').onclick=hidePhoto;
  document.getElementById('dphoto-prev').onclick=()=>photoStep(-1);
  document.getElementById('dphoto-next').onclick=()=>photoStep(1);
  document.getElementById('dphoto').addEventListener('click',e=>{if(e.target.id==='dphoto')hidePhoto();});
}
let gPhotos=[],gIdx=0;

function pick(e){
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-r.left)/r.width)*2-1;pointer.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  if(mode==='map'){
    const hit=raycaster.intersectObjects(pawns,true);
    if(hit.length){let o=hit[0].object;while(o&&!(o.userData&&o.userData.city))o=o.parent;if(o)selectCity(o);else closePopup();}else closePopup();
  }else{
    // 세부: 화면상 클릭 근처 오브젝트를 모아 겹침 처리
    const px=e.clientX-r.left, py=e.clientY-r.top, near=[], v=new THREE.Vector3();
    dPick.forEach(o=>{o.getWorldPosition(v);v.project(camera);if(v.z>1)return;
      const sx=(v.x*0.5+0.5)*r.width, sy=(-v.y*0.5+0.5)*r.height, d=Math.hypot(sx-px,sy-py);
      if(d<58)near.push({o,d});});
    near.sort((a,b)=>a.d-b.d);
    if(near.length===0){hidePickMenu();}
    else if(near.length===1){hidePickMenu();showPhoto(near[0].o.userData.pick);}
    else showPickMenu(near.map(n=>n.o),e.clientX,e.clientY);
  }
}

function buildLegend(){

  CITIES.forEach(c=>{const it=document.createElement('div');it.className='it';
    it.innerHTML='<span class="dot" style="background:'+c.css+'"></span>'+c.order+'. '+c.name;
    it.onclick=()=>{const m=pawns.find(p=>p.userData.city===c);selectCity(m);};L.appendChild(it);});
}

// 회전된 지도 안에서도 어긋나지 않게, 로컬 방향으로 직접 정렬 (lookAt=월드기준이라 안 씀)
const _UP=new THREE.Vector3(0,1,0),_FWD=new THREE.Vector3(0,0,1);
function faceLocal(obj,pos,dir,fromAxis){obj.position.copy(pos);obj.quaternion.setFromUnitVectors(fromAxis,dir);}
function pathDir(fn){const a=fn(0),b=fn(1);const d=b.clone().sub(a);if(d.lengthSq()<1e-7)return new THREE.Vector3(0,0,1);return d.normalize();}
// 수평 진행 방향만 (피치/롤 없이 yaw만 — 비행기/탈것 수평 유지)
function pathDirFlat(fn){const d=pathDir(fn);d.y=0;if(d.lengthSq()<1e-6)return new THREE.Vector3(0,0,1);return d.normalize();}
// 경로 실제 길이 (등속 이동용 — 거리가 길어도 속도 일정)
function pathLen(fn){let L=0,prev=fn(0);for(let k=1;k<=24;k++){const p=fn(k/24);L+=p.distanceTo(prev);prev=p;}return Math.max(L,0.001);}
// 동선 순번 뱃지
function makeNumBadge(n){
  const cv=document.createElement('canvas');cv.width=96;cv.height=96;const c=cv.getContext('2d');
  c.fillStyle='#18d6c2';c.beginPath();c.arc(48,48,40,0,7);c.fill();
  c.lineWidth=7;c.strokeStyle='#073b37';c.stroke();
  c.fillStyle='#06322e';c.font='bold 54px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(n,48,52);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthTest:false}));
  sp.scale.set(1.8,1.8,1);return sp;
}
let t=0;
function animate(){
  requestAnimationFrame(animate);t+=0.016;
  if(mode==='map'){
    if(idle)rotY+=0.0022;mapG.rotation.y=rotY;
    planes.forEach(pl=>{pl.userData.p=(pl.userData.p+pl.userData.spd)%1;faceLocal(pl,pl.userData.path(pl.userData.p),pl.userData.fixedDir,_FWD);});
    if(selected)selected.position.y=selected.userData.base+Math.sin(t*3)*0.5+0.6;
  }else if(detailG){
    detailG.rotation.y=rotY;
    // 빌보드 정면
    billboards.forEach(b=>b.rotation.y=-rotY);
    // 분수
    fountains.forEach(f=>{const w=f.userData.water,arr=w.pts.geometry.attributes.position.array;
      for(let i=0;i<w.N;i++){let p=w.vel[i];p.y+=0.05;let yy=(p.y%2.2);let up=5+yy*1.6-yy*yy*1.1;
        arr[i*3]=Math.cos(p.a)*p.s*yy;arr[i*3+1]=Math.max(2,up);arr[i*3+2]=Math.sin(p.a)*p.s*yy;}
      w.pts.geometry.attributes.position.needsUpdate=true;});
    // 화살표 흐름
    arrows.forEach(g=>{const u=g.userData;u.phase=(u.phase+0.016*8/u.len)%1;for(let i=0;i<u.COUNT;i++){let tt=(u.phase+i/u.COUNT)%1;faceLocal(u.chevs[i],u.at(tt),u.segDir(tt),_UP);}});
    // 입장권 흔들
    bobbers.forEach(g=>{g.position.y=g.userData.base+Math.sin(t*2.4)*1.0;g.rotation.y=Math.sin(t*1.2)*0.5;});
    // 카메라 살짝
    detailG.traverse(o=>{if(o.userData&&o.userData.spin)o.rotation.y=Math.sin(t*0.8)*0.3;});
    // 도착 비행기
    dVehicles.forEach(v=>{v.userData.p=(v.userData.p+(v.userData.spd||0.0035))%1;faceLocal(v,v.userData.path(v.userData.p),v.userData.fixedDir,_FWD);});
  }
  renderer.render(scene,camera);
}
function showLoadMsg(html){var l=document.getElementById('loading');if(l){l.style.display='flex';l.style.padding='0 28px';l.style.textAlign='center';l.style.lineHeight='1.7';l.innerHTML=html;}}
window.addEventListener('error',function(ev){showLoadMsg('문제가 생겼어요: '+((ev&&ev.message)||'알 수 없는 오류')+'<br><br>이 3D 지도는 <b>Safari·Chrome 같은 정식 브라우저</b>에서 인터넷 연결로 열어주세요.');});
if(window.__threeFail||typeof THREE==='undefined'){
  showLoadMsg('이 <b>3D 지도</b>는 카카오톡 인앱 창이나 미리보기에서는 안 열려요.<br><br>우측 상단/하단의 <b>공유·⋮ 메뉴</b>에서 <b>“Safari로 열기 / Chrome으로 열기”</b>를 눌러 정식 브라우저로 열어주세요.<br>(인터넷 연결 필요)');
}else{
  try{init();}catch(e){showLoadMsg('오류: '+e.message+'<br><br><b>Safari·Chrome</b>에서 열어주세요.');}
}
